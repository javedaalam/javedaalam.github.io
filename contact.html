<!DOCTYPE html>
<html lang="en">
<head>

    <title>Contact | Javed Aalam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0078d4; --dark: #201f1e; --light: #f3f2f1; }

        .contact-method { margin-bottom: 25px; font-size: 1.2rem; }
        .contact-method i { color: var(--primary); margin-right: 10px; font-size: 1.5rem; }
        .social-large a { font-size: 4rem; color: var(--primary); margin: 0 20px; text-decoration: none; transition: transform 0.3s; display: inline-block; }
        .social-large a:hover { transform: scale(1.1); color: var(--dark); }
        .back-btn { display: inline-block; margin-top: 30px; padding: 10px 20px; background: var(--primary); color: white; text-decoration: none; border-radius: 5px; }
