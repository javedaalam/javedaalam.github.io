<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Javed Aalam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0078d4; --dark: #201f1e; --light: #f3f2f1; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; color: var(--dark); background: #f4f4f4; text-align: center; }
        nav { background: white; padding: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav a { margin: 0 15px; text-decoration: none; color: var(--dark); font-weight: 600; }
        .contact-container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); margin-bottom: 20px; }
        
        /* Form Styling */
        form { display: flex; flex-direction: column; text-align: left; margin-bottom: 30px; }
        label { margin-bottom: 5px; font-weight: bold; }
        input, textarea { padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        textarea { height: 120px; resize: vertical; }
        .send-btn { background: var(--primary); color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: background 0.3s; }
        .send-btn:hover { background: #005a9e; }

        .social-large a { font-size: 3rem; color: var(--primary); margin: 0 15px; text-decoration: none; transition: transform 0.3s; display: inline-block; }
        .social-large a:hover { transform: scale(1.1); color: var(--dark); }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
</nav>

<div class="contact-container">
    <h1>Send Me a Message</h1>
    
    <form action="https://formspree.io/f/your_formspree_id" method="POST">
        <label>Subject</label>
        <input type="text" name="subject" placeholder="Project Inquiry / Job Opportunity" required>
        
        <label>Your Email</label>
        <input type="email" name="_replyto" placeholder="your@email.com" required>

        <label>Message</label>
        <textarea name="message" placeholder="Hello Javed, I saw your portfolio and..." required></textarea>

        <button type="submit" class="send-btn">Send Message</button>
    </form>

    <div class="social-large">
        <a href="https://www.linkedin.com/in/javedaalam/" target="_blank"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/javedaalam8052" target="_blank"><i class="fab fa-github"></i></a>
    </div>

    <br>
    <a href="index.html" class="back-btn">← Back to Portfolio</a>
</div>

</body>
</html>
