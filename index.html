<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javed Aalam | Data Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0078d4; 
            --dark: #201f1e; 
            --light: #f3f2f1; 
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            color: var(--dark); 
            background: #ffffff; 
            scroll-behavior: smooth; 
        }

        /* Navigation */
        nav { 
            position: fixed; 
            width: 100%; 
            background: white; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            padding: 15px 0; 
            z-index: 1000; 
            text-align: center; 
        }

        nav a { 
            margin: 0 15px; 
            text-decoration: none; 
            color: var(--dark); 
            font-weight: 600; 
        }

        /* Hero Section */
        .hero { 
            padding: 120px 20px 80px; 
            background: var(--primary); 
            color: white; 
            text-align: center; 
        }
        
        .profile-img { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 5px solid white; 
            object-fit: cover; 
            margin-bottom: 20px;
        }

        .hero-social-icons {
            margin-top: 35px;
        }

        .hero-icon {
            color: white !important;
            font-size: 4rem;
            margin: 0 30px;
            text-decoration: none;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .hero-icon:hover {
            transform: scale(1.2);
            color: #f3f2f1 !important;
        }

        /* Content Sections */
        .container { 
            max-width: 900px; 
            margin: auto; 
            padding: 40px 20px; 
        }

        section { 
            padding: 60px 0; 
            border-bottom: 1px solid #eee; 
        }

        h2 { 
            color: var(--primary); 
            font-size: 2rem; 
            margin-bottom: 20px; 
        }

        .card { 
            background: var(--light); 
            padding: 25px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border-left: 5px solid var(--primary); 
        }

        /* Professional Experience Project Styling */
        .project-block {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .project-block h4 {
            margin: 0 0 5px 0;
            color: var(--dark);
            font-size: 1.1rem;
        }

        .tools-text {
            font-size: 0.85rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            display: block;
        }

        .badge { 
            background: var(--primary); 
            color: white; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            display: inline-block; 
            margin: 5px 2px; 
        }

        .footer { 
            text-align: center; 
            padding: 40px; 
            background: var(--dark); 
            color: white; 
        }

        ul li {
            margin-bottom: 10px;
            line-height: 1.6;
        }
    </style>
</head>
